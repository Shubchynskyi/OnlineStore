spring:
  datasource:
    primary:
      jdbc-url: jdbc:h2:mem:onlinestore-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      username: sa
      password:
      driver-class-name: org.h2.Driver
    replica:
      jdbc-url: jdbc:h2:mem:onlinestore-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      username: sa
      password:
      driver-class-name: org.h2.Driver
  flyway:
    enabled: false
    clean-disabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false
  data:
    redis:
      host: localhost
      port: 6379
    elasticsearch:
      repositories:
        enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:0/realms/test
onlinestore:
  search:
    enabled: false
management:
  health:
    redis:
      enabled: false
    rabbit:
      enabled: false
    elasticsearch:
      enabled: false
logging:
  level:
    com.onlinestore: INFO
