spring:
  application:
    name: onlinestore-backend
  profiles:
    active: dev

  datasource:
    primary:
      jdbc-url: jdbc:postgresql://${DB_PRIMARY_HOST:localhost}:${DB_PRIMARY_PORT:5432}/${DB_NAME:online_store}
      username: ${DB_USER}
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 20000
    replica:
      jdbc-url: jdbc:postgresql://${DB_REPLICA_HOST:localhost}:${DB_REPLICA_PORT:5433}/${DB_NAME:online_store}
      username: ${DB_USER}
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 30
        minimum-idle: 10
        connection-timeout: 20000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/online-store}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}

  jackson:
    default-property-inclusion: non_null

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

onlinestore:
  catalog:
    media:
      endpoint: ${CATALOG_MEDIA_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ROOT_USER:minioadmin}
      secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
      bucket: ${CATALOG_MEDIA_BUCKET:product-images}
      public-base-url: ${CATALOG_MEDIA_PUBLIC_BASE_URL:http://localhost:9000/product-images}
      presigned-upload-expiry-minutes: ${CATALOG_MEDIA_PRESIGNED_UPLOAD_EXPIRY_MINUTES:15}
      max-upload-size-bytes: ${CATALOG_MEDIA_MAX_UPLOAD_SIZE_BYTES:10485760}
      allowed-content-types: ${CATALOG_MEDIA_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp,image/gif}
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://127.0.0.1:3000,http://127.0.0.1:4200}
      allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
      allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Accept-Language,Cache-Control,Pragma,X-Requested-With}
  payments:
    webhook:
      max-age-seconds: ${PAYMENTS_WEBHOOK_MAX_AGE_SECONDS:300}
    paypal:
      webhook-secret: ${PAYPAL_WEBHOOK_SECRET:}
