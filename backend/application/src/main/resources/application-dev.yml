spring:
  datasource:
    primary:
      username: ${DB_USER}
      password: ${DB_PASSWORD}
    replica:
      username: ${DB_USER}
      password: ${DB_PASSWORD}
  rabbitmq:
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1s
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    com.onlinestore: DEBUG
