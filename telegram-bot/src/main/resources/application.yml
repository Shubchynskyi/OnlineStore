spring:
  application:
    name: telegram-bot
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:admin_password}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

telegram:
  bot:
    enabled: ${TELEGRAM_BOT_ENABLED:true}
    token: ${TELEGRAM_BOT_TOKEN}
    username: ${TELEGRAM_BOT_USERNAME:}
    webhook-url: ${TELEGRAM_WEBHOOK_URL:}
    webhook-path: ${TELEGRAM_WEBHOOK_PATH:/telegram/webhook}
    base-url: ${TELEGRAM_BASE_URL:https://api.telegram.org}
    session-ttl: ${TELEGRAM_SESSION_TTL:12h}
    interaction-lock-ttl: ${TELEGRAM_INTERACTION_LOCK_TTL:4m}
    retry:
      max-attempts: ${TELEGRAM_RETRY_MAX_ATTEMPTS:3}
      backoff: ${TELEGRAM_RETRY_BACKOFF:500ms}
    backend-api:
      base-url: ${BACKEND_API_BASE_URL:http://localhost:8080}
      catalog-page-size: ${BACKEND_API_CATALOG_PAGE_SIZE:6}
      search-page-size: ${BACKEND_API_SEARCH_PAGE_SIZE:5}
      recent-orders-page-size: ${BACKEND_API_RECENT_ORDERS_PAGE_SIZE:3}
      customer-token-attribute-key: ${BACKEND_CUSTOMER_TOKEN_ATTRIBUTE_KEY:backendAccessToken}
      connect-timeout: ${BACKEND_API_CONNECT_TIMEOUT:5s}
      read-timeout: ${BACKEND_API_READ_TIMEOUT:10s}
      retry:
        max-attempts: ${BACKEND_API_RETRY_MAX_ATTEMPTS:3}
        backoff: ${BACKEND_API_RETRY_BACKOFF:300ms}
      service-auth:
        enabled: ${BACKEND_SERVICE_AUTH_ENABLED:false}
        token-url: ${BACKEND_SERVICE_AUTH_TOKEN_URL:http://localhost:8180/realms/online-store/protocol/openid-connect/token}
        client-id: ${BACKEND_SERVICE_AUTH_CLIENT_ID:telegram-bot}
        client-secret: ${BACKEND_SERVICE_AUTH_CLIENT_SECRET:}
        scope: ${BACKEND_SERVICE_AUTH_SCOPE:}
    ai-assistant:
      enabled: ${TELEGRAM_AI_ASSISTANT_ENABLED:false}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o-mini}
      max-completion-tokens: ${OPENAI_MAX_COMPLETION_TOKENS:320}
      max-history-messages: ${OPENAI_MAX_HISTORY_MESSAGES:10}
      max-retrieved-products: ${OPENAI_MAX_RETRIEVED_PRODUCTS:3}
      max-product-description-characters: ${OPENAI_MAX_PRODUCT_DESCRIPTION_CHARACTERS:160}
      max-user-message-characters: ${OPENAI_MAX_USER_MESSAGE_CHARACTERS:500}
      max-session-tokens: ${OPENAI_MAX_SESSION_TOKENS:4000}
      temperature: ${OPENAI_TEMPERATURE:0.2}
      fallback-message: "${OPENAI_FALLBACK_MESSAGE:The AI assistant is temporarily unavailable. Please use /search or /catalog and try again later.}"
      token-budget-message: "${OPENAI_TOKEN_BUDGET_MESSAGE:This assistant chat reached the session token budget. Clear the conversation and try again.}"
      connect-timeout: ${OPENAI_CONNECT_TIMEOUT:5s}
      read-timeout: ${OPENAI_READ_TIMEOUT:30s}
      retry:
        max-attempts: ${OPENAI_RETRY_MAX_ATTEMPTS:2}
        backoff: ${OPENAI_RETRY_BACKOFF:500ms}
    manager-notifications:
      enabled: ${TELEGRAM_MANAGER_NOTIFICATIONS_ENABLED:false}
      chat-id: ${TELEGRAM_MANAGER_CHAT_ID:}
      chat-ids: ${TELEGRAM_MANAGER_CHAT_IDS:}
      user-id: ${TELEGRAM_MANAGER_USER_ID:}
      user-ids: ${TELEGRAM_MANAGER_USER_IDS:}
      notify-order-created: ${TELEGRAM_MANAGER_NOTIFY_ORDER_CREATED:true}
      notify-order-status-changed: ${TELEGRAM_MANAGER_NOTIFY_ORDER_STATUS_CHANGED:true}
      notify-product-low-stock: ${TELEGRAM_MANAGER_NOTIFY_PRODUCT_LOW_STOCK:true}
